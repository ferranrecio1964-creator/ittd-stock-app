<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ITTDynamics Stock App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
background:#d6d6d6;
font-family:Arial, Helvetica, sans-serif;
}
</style>

</head>

<body class="p-6">

<div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-xl">

<div class="flex items-center justify-between mb-6">

<div class="flex items-center gap-4">

<div class="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center text-xl font-bold">
IT
</div>

<div>
<h1 class="text-2xl font-bold">Stock / Pedidos / Reservas · Consulta y Precios</h1>
<p class="text-gray-500">ITTDynamics</p>
</div>

</div>

<div>
<img id="logoMarca" src="" class="h-10 hidden">
</div>

</div>


<div class="grid grid-cols-5 gap-4 mb-6">

<select id="marca" class="border p-2 rounded">
<option value="">Marca</option>
</select>

<select id="familia" class="border p-2 rounded">
<option value="">Familia</option>
</select>

<select id="modelo" class="border p-2 rounded">
<option value="">Modelo</option>
</select>

<select id="estado" class="border p-2 rounded">
<option value="">Estado</option>
</select>

<input id="search" placeholder="Buscar modelo, marca o cliente"
class="border p-2 rounded">

</div>


<div class="mb-6">
<input type="file" id="excelFile">
</div>


<table class="w-full text-sm border">

<thead class="bg-slate-200">

<tr>
<th class="p-2">Marca</th>
<th class="p-2">Modelo</th>
<th class="p-2">Estado</th>
<th class="p-2">Familia</th>
<th class="p-2">Cliente reserva</th>
<th class="p-2">Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<script>

let data=[]

const logoMarca=document.getElementById("logoMarca")

const logos={
"BOBCAT":"./bobcat-decal-6731507-57_1.PNG",
"AUSA":"./ausa.PNG"
}

document.getElementById("excelFile").addEventListener("change",function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(evt){

const workbook=XLSX.read(evt.target.result,{type:"binary"})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

data=XLSX.utils.sheet_to_json(sheet)

render()

}

reader.readAsBinaryString(file)

})


function render(){

const marca=document.getElementById("marca").value.toLowerCase()
const familia=document.getElementById("familia").value.toLowerCase()
const modelo=document.getElementById("modelo").value.toLowerCase()
const estado=document.getElementById("estado").value.toLowerCase()
const search=document.getElementById("search").value.toLowerCase()

let filtrado=data.filter(r=>{

const marcaRow=(r["Marca"]||"").toLowerCase()
const modeloRow=(r["Modelo"]||"").toLowerCase()
const clienteRow=(r["Razon social"]||"").toLowerCase()

if(marca && marcaRow!==marca) return false
if(modelo && modeloRow!==modelo) return false
if(search && !(modeloRow.includes(search)||marcaRow.includes(search)||clienteRow.includes(search))) return false

return true

})

const tabla=document.getElementById("tabla")

tabla.innerHTML=""

filtrado.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td class="p-2">${r["Marca"]||""}</td>
<td class="p-2">${r["Modelo"]||""}</td>
<td class="p-2">${r["Situacio"]||""}</td>
<td class="p-2">${r["Familia"]||""}</td>
<td class="p-2">${r["Razon social"]||""}</td>

<td class="p-2">
<button class="bg-slate-800 text-white px-4 py-1 rounded">
Ver cálculo
</button>
</td>

`

tabla.appendChild(tr)

})

}

document.getElementById("marca").addEventListener("change",e=>{

const marca=e.target.value

if(logos[marca]){

logoMarca.src=logos[marca]
logoMarca.classList.remove("hidden")

}else{

logoMarca.classList.add("hidden")

}

render()

})

document.getElementById("search").addEventListener("keyup",render)

</script>

</body>
</html>
